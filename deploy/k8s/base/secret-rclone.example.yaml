# PLANTILLA — no se aplica con kustomize ni debe commitearse con valores reales.
# Crear el secret real así:
#   kubectl -n bcv-fx create secret generic rclone-conf --from-file=rclone.conf
#
# rclone.conf de ejemplo con los tres remotes que usa el CronJob (s3, gcs, r2):
#
#   [s3]
#   type = s3
#   provider = AWS
#   env_auth = true            # IRSA en EKS (ver overlay)
#   region = us-east-1
#
#   [gcs]
#   type = google cloud storage
#   env_auth = true            # Workload Identity en GKE (ver overlay)
#
#   [r2]
#   type = s3
#   provider = Cloudflare
#   access_key_id = <R2_ACCESS_KEY_ID>
#   secret_access_key = <R2_SECRET_ACCESS_KEY>
#   endpoint = https://<ACCOUNT_ID>.r2.cloudflarestorage.com
#
apiVersion: v1
kind: Secret
metadata:
  name: rclone-conf
  namespace: bcv-fx
type: Opaque
stringData:
  rclone.conf: |
    # reemplazar por la configuración real (ver comentario superior)
