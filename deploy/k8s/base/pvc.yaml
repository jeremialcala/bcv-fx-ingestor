apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: datos-ingestor
  namespace: bcv-fx
  labels:
    app.kubernetes.io/name: bcv-fx-ingestor
spec:
  # storageClassName lo fija cada overlay (gp3 en EKS, standard-rwo en GKE)
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
