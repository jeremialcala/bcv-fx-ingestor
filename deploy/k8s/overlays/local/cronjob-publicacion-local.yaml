apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingesta-bcv
  namespace: bcv-fx
spec:
  jobTemplate:
    spec:
      template:
        spec:
          # mismos valores que la base: el merge es idempotente, pero deja este patch
          # seguro leído en solitario (trivy escanea también los archivos parciales)
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: publicar
              args:
                - |
                  set -e
                  [ -f /data/publicacion/indice.json ] || {
                    echo "publicacion/ ausente o sin indice: no se publica" >&2
                    exit 1
                  }
                  mkdir -p /data/publicado
                  rclone copyto /data/bcv_fx.db /data/publicado/bcv_fx.db
                  rclone sync /data/publicacion /data/publicado/publicacion
                  echo "publicado localmente en /data/publicado (bcv_fx.db + publicacion/)"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: datos
                  mountPath: /data
                  readOnly: false
                - name: rclone-conf
                  mountPath: /config/rclone
                  readOnly: true
