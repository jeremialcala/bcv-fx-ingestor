# Pipeline CI con los gates de seguridad de AI-DLC (ADR-0005).
# Mapa gate -> job: SAST->sast, SCA->sca, secrets->secrets, license->license,
# container->container, IaC->iac. DAST: sin scanner dedicado, justificado en
# docs/05-deployment/deployment.md (la API del Worker se cubre con la suite
# vitest hostil del job `worker` y los curls post-deploy del runbook).
name: CI

on:
  push:
    branches: [main, develop] # gitflow: el trabajo vive en develop (FX-ING-002)
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # re-scan semanal: las CVEs aparecen sin cambios de código (A09)

permissions:
  contents: read

jobs:
  tests:
    name: tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]" pytest-cov
      - run: python -m pytest --cov=bcv_ingest --cov-report=term --cov-fail-under=90

  # pirámide de tests del Worker (FX-ING-002): contrato completo en workerd real
  worker:
    name: worker (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/cloudflare
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: deploy/cloudflare/package-lock.json
      - run: npm ci
      - run: npm test

  sast:
    name: sast (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install bandit
      - run: bandit -r src

  sca:
    name: sca (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pip-audit
      - run: python -m pip_audit --local

  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license:
    name: license (pip-licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pip-licenses
      - name: verificar allowlist de licencias
        run: >
          pip-licenses --partial-match
          --allow-only="MIT;BSD;Apache;Python Software Foundation;PSF-2.0;ISC;Mozilla Public License 2.0"
          --ignore-packages bcv-fx-ingestor pip setuptools

  docs:
    name: docs (mermaid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: validar todos los bloques Mermaid
        env:
          MERMAID_CACHE: ${{ runner.temp }}/mermaid
        run: python scripts/validate_mermaid.py .

  container:
    name: container (build + trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: build
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: bcv-fx-ingestor:ci
      - name: trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: bcv-fx-ingestor:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: verificar tag == versión del paquete
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "el tag v$tag no coincide con pyproject.version=$version" >&2
            exit 1
          fi
      - name: login GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push a GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  iac:
    name: iac (kubeconform + trivy config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: instalar kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: validar manifests (base + overlays)
        run: |
          for objetivo in deploy/k8s/base deploy/k8s/overlays/eks deploy/k8s/overlays/gke deploy/k8s/overlays/local; do
            echo "== $objetivo =="
            kubectl kustomize "$objetivo" | kubeconform -strict -summary -
          done
      - name: trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: deploy
          severity: HIGH,CRITICAL
          exit-code: "1"
